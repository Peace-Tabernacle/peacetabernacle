<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcasts</title>
    <link rel="stylesheet" href="podcast.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Welcome Image Slider -->
    <div class="slider">
        <img src="testimonies/pod.jpeg" alt="Welcome Image 1">
        <img src="testimonies/poddd.jpeg" alt="Welcome Image 2">
        <img src="testimonies/HHH.jpg" alt="Welcome Image 3">
    </div>

    <!-- Podcast List -->
    <div class="podcast-list">
        <!-- Example Podcast Item -->
        <div class="podcast-item">
            <img src="testimonies/pod.jpeg" alt="Podcast 1" class="podcast-image" onclick="toggleAudio('podcast1')">
            <div class="audio-container" id="podcast1" style="display:none;">
                <!-- Title above the audio player -->
                <h3 class="podcast-title">Hope</h3>
                <audio controls>
                    <source src="audios/Congregation-Malawi.mp3" type="audio/mp3">
                    Your browser does not support the audio element.
                </audio>
            </div>
            <div class="podcast-controls">
                <button class="like-btn">Like <span class="like-count">0</span></button>
                <button class="share-btn">Share</button>
            </div>
        </div>

        <div class="podcast-item">
            <img src="testimonies/killer move.jpg" alt="Podcast 3" class="podcast-image" onclick="toggleAudio('podcast3')">
            <div class="audio-container" id="podcast3" style="display:none;">
                <!-- Title above the audio player -->
                <h3 class="podcast-title">Faith</h3>
                <audio controls>
                    <source src="audios/Draw me nearer.mp3" type="audio/mp3">
                    Your browser does not support the audio element.
                </audio>
            </div>
            <div class="podcast-controls">
                <button class="like-btn">Like <span class="like-count">0</span></button>
                <button class="share-btn">Share</button>
            </div>
        </div>
        <div class="podcast-item">
            <img src="testimonies/poddd.jpeg" alt="Podcast 2" class="podcast-image" onclick="toggleAudio('podcast2')">
            <div class="audio-container" id="podcast2" style="display:none;">
                <!-- Title above the audio player -->
                <h3 class="podcast-title">Love</h3>
                <audio controls>
                    <source src="audios/Be Still and Know.mp3" type="audio/mp3">
                    Your browser does not support the audio element.
                </audio>
            </div>
            <div class="podcast-controls">
                <button class="like-btn">Like <span class="like-count">0</span></button>
                <button class="share-btn">Share</button>
            </div>
        </div>
        <div class="podcast-item">
            <img src="testimonies/poddddddd.jpeg" alt="Podcast 4" class="podcast-image" onclick="toggleAudio('podcast4')">
            <div class="audio-container" id="podcast4" style="display:none;">
                <!-- Title above the audio player -->
                <h3 class="podcast-title">Peace</h3>
                <audio controls>
                    <source src="audios/Lema Lema.mp3" type="audio/mp3">
                    Your browser does not support the audio element.
                </audio>
            </div>
            <div class="podcast-controls">
                <button class="like-btn">Like <span class="like-count">0</span></button>
                <button class="share-btn">Share</button>
            </div>
        </div>
        <!-- Repeat for other podcasts... -->
    </div>

    <script>
        // Auto sliding for welcome images
        let index = 0;
        const slides = document.querySelectorAll('.slider img');
        const totalSlides = slides.length;

        function showNextSlide() {
            slides[index].style.opacity = 0;
            index = (index + 1) % totalSlides;
            slides[index].style.opacity = 1;
        }

        setInterval(showNextSlide, 3000);

        // Function to toggle audio player when the image is clicked
        function toggleAudio(podcastId) {
            const audioContainer = document.getElementById(podcastId);

            // Toggle visibility: If the audio container is hidden, show it; otherwise, hide it
            if (audioContainer.style.display === 'none' || audioContainer.style.display === '') {
                audioContainer.style.display = 'block';
            } else {
                audioContainer.style.display = 'none';
            }
        }

        // Like button functionality
        const likeButtons = document.querySelectorAll('.like-btn');
        likeButtons.forEach(button => {
            button.addEventListener('click', () => {
                const likeCount = button.querySelector('.like-count');
                likeCount.textContent = parseInt(likeCount.textContent) + 1;
            });
        });

        // Share button functionality
        const shareButtons = document.querySelectorAll('.share-btn');
        shareButtons.forEach(button => {
            button.addEventListener('click', () => {
                alert('Share functionality coming soon!');
            });
        });
    </script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: white;
            color: #333;
            margin: 0;
            padding: 0;
        }
        
        .slider {
            width: 100%;
            height: 300px;
            overflow: hidden;
            position: relative;
        }
        
        .slider img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            animation: slide 10s infinite;
        }
        
        @keyframes slide {
            0% {
                left: 0;
            }
            33% {
                left: -100%;
            }
            66% {
                left: -200%;
            }
            100% {
                left: 0;
            }
        }
        
        .podcast-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            justify-content: center;
        }
        
        .podcast-item {
            position: relative;
            width: 200px;
            height: 300px;
            text-align: center;
            background-color: #f1f1f1;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .podcast-item:hover {
            transform: scale(1.05);
        }
        
        .podcast-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }
        
        .podcast-item:hover .podcast-image {
            opacity: 0.7;
        }
        
        .audio-container {
            display: none;
            background-color: rgba(0, 0, 0, 0.7);
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px;
            border-radius: 10px;
            width: 90%;
            box-sizing: border-box;
            text-align: center;
        }
        
        .podcast-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        
        .podcast-controls {
            display: flex;
            justify-content: space-between;
            padding: 10px;
        }
        
        .like-btn,
        .share-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        
        .like-btn:hover,
        .share-btn:hover {
            background-color: #0056b3;
        }
        /* Responsive Design */
        
        @media (max-width: 768px) {
            .podcast-list {
                justify-content: space-around;
            }
            .podcast-item {
                width: 45%;
                height: 250px;
            }
            .podcast-controls {
                flex-direction: column;
                align-items: center;
            }
            .like-btn,
            .share-btn {
                width: 100%;
                margin: 5px 0;
            }
        }
        
        @media (max-width: 480px) {
            .slider {
                height: 200px;
            }
            .podcast-item {
                width: 90%;
                height: 220px;
            }
        }
    </style>

</body>

</html>
